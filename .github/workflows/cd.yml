name: CD — Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_FRONTEND: ${{ secrets.DOCKER_HUB_USERNAME }}/dataset-analyser-frontend
  IMAGE_BACKEND: ${{ secrets.DOCKER_HUB_USERNAME }}/dataset-analyser-backend

jobs:
  # ──────────────────────────────────────────
  # Build & Push Frontend Image
  # ──────────────────────────────────────────
  build-push-frontend:
    name: Frontend — Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Build & Push Backend Image
  # ──────────────────────────────────────────
  build-push-backend:
    name: Backend — Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Summary: post image tags as a job summary
  # ──────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-push-frontend, build-push-backend]

    steps:
      - name: Write summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.IMAGE_FRONTEND }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ env.IMAGE_BACKEND }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────
  # Trigger Render Deployment Webhooks
  # ──────────────────────────────────────────
  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-push-frontend, build-push-backend]
    
    steps:
      - name: Trigger Frontend Render Deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            echo "RENDER_DEPLOY_HOOK_FRONTEND is not set. Skipping."
          else
            echo "Triggering Render Frontend redeploy..."
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          fi

      - name: Trigger Backend Render Deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            echo "RENDER_DEPLOY_HOOK_BACKEND is not set. Skipping."
          else
            echo "Triggering Render Backend redeploy..."
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          fi
